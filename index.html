<!DOCTYPE html>
<html>

<head>
 <base target="_top">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
 <title>Lector QR - Control de Activos</title>
 <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
 <style>
  /* Reset y Estilos Base */
  * {
   box-sizing: border-box;
   margin: 0;
   padding: 0;
  }

  body {
   font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
   background-color: #f4f4f9;
   display: flex;
   flex-direction: column;
   height: 100vh;
   color: #333;
   transition: background-color 0.4s ease;
   /* Transición suave de colores */
  }

  h1 {
   font-size: 1.2rem;
   padding: 15px;
   text-align: center;
   background: #2c3e50;
   color: white;
   box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
  }

  /* Contenedor Principal */
  .main-container {
   flex: 1;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   padding: 20px;
   gap: 20px;
  }

  /* Contenedor de Video (Proporción ajustable) */
  .video-wrapper {
   position: relative;
   width: 100%;
   max-width: 450px;
   overflow: hidden;
   border-radius: 15px;
   border: 5px solid #333;
   box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
   background: #000;
   line-height: 0;
  }

  #video {
   width: 100%;
   height: auto;
   max-height: 55vh;
   /* Evita que el video empuje los botones fuera de pantalla */
   object-fit: cover;
  }

  /* Panel de Mensajes */
  #output {
   width: 100%;
   max-width: 450px;
   min-height: 70px;
   padding: 15px;
   background: rgba(255, 255, 255, 0.9);
   border-radius: 10px;
   text-align: center;
   font-weight: 600;
   box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
   font-size: 1rem;
   display: flex;
   align-items: center;
   justify-content: center;
   border: 1px solid #ddd;
  }

  /* Grupo de Botones */
  .button-group {
   width: 100%;
   max-width: 450px;
   display: grid;
   grid-template-columns: 1fr 1fr;
   gap: 15px;
  }

  button {
   padding: 16px 10px;
   font-size: 0.95rem;
   font-weight: bold;
   border: none;
   border-radius: 12px;
   cursor: pointer;
   text-transform: uppercase;
   box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
   transition: transform 0.1s, filter 0.2s;
  }

  button:active {
   transform: scale(0.95);
  }

  button:disabled {
   opacity: 0.4;
   filter: grayscale(1);
   cursor: not-allowed;
  }

  #flashButton {
   background-color: #f1c40f;
   color: #2c3e50;
  }

  #restartButton {
   background-color: #2ecc71;
   color: white;
  }

  /* Ajustes para Tablets */
  @media (min-width: 768px) {
   h1 {
    font-size: 1.6rem;
   }

   .video-wrapper {
    max-width: 600px;
   }

   #video {
    max-height: 60vh;
   }

   button {
    font-size: 1.1rem;
    padding: 20px;
   }

   #output {
    font-size: 1.2rem;
   }
  }
 </style>
</head>

<body>

 <h1>Lector de Activos QR</h1>

 <div class="main-container">

  <div class="video-wrapper">
   <video id="video" autoplay playsinline></video>
  </div>

  <div id="output">Cargando cámara...</div>

  <div class="button-group">
   <button id="flashButton" disabled>Flash</button>
   <button id="restartButton">Reanudar</button>
  </div>

 </div>

 <canvas id="canvas" hidden></canvas>

 <script>
  const video = document.getElementById('video');
  const canvasElement = document.getElementById('canvas');
  const canvas = canvasElement.getContext('2d');
  const output = document.getElementById('output');
  const flashButton = document.getElementById('flashButton');
  const restartButton = document.getElementById('restartButton');

  let escaneando = true;
  let track = null;

  // Reglas de validación
  const REQUIRED_PATTERNS = ['Activo:', 'id:', 'CompanyName:', 'AssetName:'];

  async function startCamera() {
   try {
    const stream = await navigator.mediaDevices.getUserMedia({
     video: {
      facingMode: 'environment',
      width: { ideal: 1280 },
      height: { ideal: 720 }
     }
    });
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];

    // Verificamos soporte de Flash (Torch)
    if (track && track.getCapabilities && 'torch' in track.getCapabilities()) {
     flashButton.disabled = false;
    } else {
     flashButton.innerText = "No Flash";
    }

    video.play();
    requestAnimationFrame(tick);
    output.innerText = 'Apunta a un código QR';

   } catch (err) {
    output.style.color = "red";
    output.innerText = 'Error: No se pudo acceder a la cámara. Revisa los permisos.';
    console.error(err);
   }
  }

  function tick() {
   if (video.readyState === video.HAVE_ENOUGH_DATA && escaneando) {
    canvasElement.height = video.videoHeight;
    canvasElement.width = video.videoWidth;
    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

    if (code) {
     escaneando = false;
     const rawData = code.data;
     const isValid = REQUIRED_PATTERNS.every(pattern => rawData.includes(pattern));

     if (isValid) {
      // FEEDBACK POSITIVO
      document.body.style.backgroundColor = "#d4edda"; // Verde claro
      output.style.color = "#155724";
      output.innerText = '✅ QR Válido. Enviando datos...';

      // Si el móvil lo soporta, vibra 100ms
      if (navigator.vibrate) navigator.vibrate(100);

      sendDataToAppsScript(rawData);
     } else {
      // FEEDBACK NEGATIVO
      document.body.style.backgroundColor = "#f8d7da"; // Rojo claro
      output.style.color = "#721c24";
      output.innerText = '🚨 Código no reconocido como activo válido.';

      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
     }
    }
   }

   if (escaneando) {
    requestAnimationFrame(tick);
   }
  }

  // Control del Flash
  flashButton.addEventListener('click', async () => {
   if (!track) return;
   try {
    const currentStatus = track.getSettings().torch || false;
    await track.applyConstraints({
     advanced: [{ torch: !currentStatus }]
    });
    flashButton.innerText = !currentStatus ? 'Apagar Flash' : 'Encender Flash';
   } catch (e) {
    console.error("Error con el flash:", e);
   }
  });

  // Reanudar Escaneo
  restartButton.addEventListener('click', () => {
   escaneando = true;
   document.body.style.backgroundColor = "#f4f4f9"; // Volver al gris original
   output.style.color = "#333";
   output.innerText = 'Escaneando...';
   requestAnimationFrame(tick);
  });

  // Comunicación con Google Apps Script
  function sendDataToAppsScript(datos) {
   google.script.run
    .withSuccessHandler(function (res) {
     output.innerText = '✨ ¡Éxito! ' + res;
    })
    .withFailureHandler(function (err) {
     output.innerText = '🚨 Error en el servidor. Intenta de nuevo.';
    })
    .procesarResultadoQR(datos);
  }

  // Iniciar al cargar la ventana
  window.addEventListener('load', startCamera);
 </script>
</body>

</html>
